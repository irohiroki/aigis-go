# Aigis Policy: Aigis Developer Policy
# Generated by Aigis v0.3.0

name: "Aigis Developer Policy"
version: "1.0"
default_decision: allow

rules:
  - id: dangerous_commands
    action: "shell:exec"
    target: "rm -rf *"
    decision: deny
    reason: "Recursive forced deletion is blocked"

  - id: dangerous_format
    action: "shell:exec"
    target: "*mkfs*"
    decision: deny
    reason: "Filesystem format commands are blocked"

  - id: dangerous_dd
    action: "shell:exec"
    target: "*dd if=*"
    decision: deny
    reason: "Raw disk operations are blocked"

  - id: sudo_commands
    action: "shell:exec"
    target: "sudo *"
    decision: review
    reason: "Privilege escalation requires review"

  - id: env_file_protection
    action: "file:write"
    target: ".env*"
    decision: deny
    reason: "Environment files are protected from modification"

  - id: secrets_dir_protection
    action: "file:*"
    target: "*secrets*"
    decision: review
    reason: "Access to secrets directories requires review"

  - id: ssh_key_protection
    action: "file:*"
    target: "*.ssh/*"
    decision: deny
    reason: "SSH key access is blocked"

  - id: credentials_protection
    action: "file:write"
    target: "*credentials*"
    decision: deny
    reason: "Credential files are protected"

  - id: pipe_to_shell
    action: "shell:exec"
    target: "*| bash*"
    decision: deny
    reason: "Piping remote content to shell is blocked"

  - id: pipe_to_sh
    action: "shell:exec"
    target: "*| sh*"
    decision: deny
    reason: "Piping remote content to shell is blocked"

  - id: git_force_push
    action: "shell:exec"
    target: "*--force*"
    decision: deny
    reason: "Force push is blocked"

  - id: git_push_review
    action: "shell:exec"
    target: "git push*"
    decision: review
    reason: "Git push requires review"

  - id: agent_spawn_review
    action: "agent:spawn"
    target: "*"
    decision: review
    reason: "Spawning sub-agents requires review"

  - id: llm_prompt_scan
    action: "llm:prompt"
    target: "*"
    decision: allow
    reason: "LLM prompts are scanned by Aigis's detection engine"

  - id: risk_threshold_critical
    action: "*"
    target: "*"
    decision: deny
    reason: "Critical-risk content detected by Aigis scan engine"
    conditions:
      risk_above: 80

  - id: risk_threshold_medium
    action: "*"
    target: "*"
    decision: review
    reason: "Suspicious content detected by Aigis scan engine"
    conditions:
      risk_above: 40
